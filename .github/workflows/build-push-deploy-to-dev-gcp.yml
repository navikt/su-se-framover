name: build-push-deploy-to-gcp.yml

on:
    push:
        branches-ignore:
            - 'gh-readonly-queue/**'
    workflow_dispatch:
      inputs:
        deploy_prod:
          description: 'Deploy to production'
          type: boolean
          required: false
          default: false

permissions: {}

jobs:
    build-push-docker-image:
        name: build-push-docker-image
        runs-on: ubuntu-latest
        outputs:
            image: ${{ steps.docker-build-push.outputs.image }}
        permissions:
            packages: 'write'
            contents: 'read'
            id-token: 'write'
        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: false
            - uses: actions/setup-node@v6.2.0
              with:
                  node-version: '24.1.0'
            - name: Ensure npm has min-release-age support
              # Denne versjonen er første med min-release-age support
              run: |
                npm i -g npm@11.10.0
                npm -v
            - name: install-deps-client-and-server
              run: npm ci --min-release-age 20
            - name: lint-and-typecheck
              run: npm run lint-and-typecheck
            - name: build-client
              run: npm run build
            - name: build-server
              working-directory: server
              run: npm run build
            - name: docker-login
              if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.repository }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and publish Docker image
              if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
              uses: nais/docker-build-push@v0
              id: docker-build-push
              with:
                  docker_context: .
                  team: supstonad
                  salsa: false
                  image_suffix: app # hvis denne endres så må prod-deploy oppdateres likt
                  tag: ${{ github.sha }}

    deploy-to-dev-gcp:
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
        name: deploy-to-dev-gcp
        permissions:
            contents: read
            id-token: write
        needs: build-push-docker-image
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: nais/deploy/actions/deploy@v2
              env:
                  CLUSTER: dev-gcp
                  RESOURCE: .nais/dev-gcp.yaml
                  VAR: image=${{ needs.build-push-docker-image.outputs.image }}

    deploy-to-prod:
        needs: build-push-docker-image
        if: ${{ inputs.deploy_prod == true && github.ref == 'refs/heads/master' }}
        name: Deploy to prod gcp
        permissions:
            contents: read
            id-token: write
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: nais/deploy/actions/deploy@v2
              env:
                  CLUSTER: prod-gcp
                  RESOURCE: .nais/prod-gcp.yaml
                  VAR: image=${{ needs.build-push-docker-image.outputs.image }}
