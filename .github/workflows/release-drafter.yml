name: Release Drafter

on:
    push:
        branches:
            - master
    release:
        types:
            - published

permissions: {}

jobs:
    update-release-draft:
        name: Generate/update draft release
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: read
        steps:
            - id: drafter
              uses: release-drafter/release-drafter@v6.4.0
              with:
                  config-name: release-drafter.yml
                  disable-autolabeler: true
                  commitish: master
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            - name: Log drafted release
              run: |
                  echo "Draft tag: ${{ steps.drafter.outputs.tag_name }}"
                  echo "Draft name: ${{ steps.drafter.outputs.name }}"
                  echo "Draft url: ${{ steps.drafter.outputs.html_url }}"
